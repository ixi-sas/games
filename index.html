<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Juegos de Ingenio</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700;900&display=swap');

*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;min-height:100%;
  font-family:'Nunito',sans-serif;
  background:#fff;
  color:#1a1a2e;
  overflow-x:hidden;
  user-select:none;-webkit-user-select:none;
}

/* ===== PARTICLES ===== */
.particles{
  position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0;
}
.particle{
  position:absolute;border-radius:50%;opacity:0;
  animation:particleFloat linear infinite;
}
@keyframes particleFloat{
  0%  {transform:translateY(100vh) rotate(0deg);  opacity:0}
  10% {opacity:.3}
  90% {opacity:.3}
  100%{transform:translateY(-10vh) rotate(360deg);opacity:0}
}

/* ===== LAYOUT ===== */
.page{
  position:relative;z-index:1;
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;
  padding:0 20px 80px;
}

/* ===== HERO ===== */
.hero{
  display:flex;flex-direction:column;align-items:center;
  padding:clamp(48px,10vh,100px) 0 clamp(32px,6vh,64px);
  text-align:center;
}

.hero-eyebrow{
  font-family:'Bangers',cursive;
  font-size:clamp(14px,1.8vw,20px);
  color:#75AADB;
  letter-spacing:8px;
  margin-bottom:10px;
  opacity:0;
  animation:fadeDown .5s ease .1s forwards;
}

.hero-title{
  font-family:'Bangers',cursive;
  font-size:clamp(64px,14vw,160px);
  color:#1a1a2e;
  line-height:.92;
  letter-spacing:4px;
  text-shadow:5px 5px 0 #75AADB, 10px 10px 0 rgba(117,170,219,0.12);
  opacity:0;
  animation:titleEntry .8s cubic-bezier(.2,0,0,1) .25s forwards;
}
.hero-title span{color:#F5A623}

.hero-tagline{
  font-size:clamp(15px,2.2vw,22px);
  font-weight:900;
  color:#888;
  letter-spacing:2px;
  margin-top:14px;
  opacity:0;
  animation:fadeDown .5s ease .8s forwards;
}

@keyframes fadeDown{
  from{opacity:0;transform:translateY(-12px)}
  to  {opacity:1;transform:translateY(0)}
}
@keyframes titleEntry{
  from{opacity:0;transform:scale(.72) translateY(24px)}
  to  {opacity:1;transform:scale(1)   translateY(0)}
}

/* ===== DIVIDER ===== */
.divider{
  width:clamp(60px,10vw,100px);height:5px;
  background:linear-gradient(90deg,#75AADB,#F5A623);
  border-radius:10px;
  margin:0 auto clamp(32px,6vh,64px);
  opacity:0;
  animation:fadeDown .5s ease 1s forwards;
}

/* ===== GRID ===== */
.grid-label{
  font-family:'Bangers',cursive;
  font-size:clamp(18px,2.5vw,26px);
  color:#ccc;
  letter-spacing:5px;
  margin-bottom:clamp(20px,4vh,36px);
  opacity:0;
  animation:fadeDown .5s ease 1.1s forwards;
}

.games-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(clamp(280px,38vw,380px),1fr));
  gap:clamp(18px,3vw,30px);
  width:100%;
  max-width:900px;
}

/* ===== GAME CARD ===== */
.game-card{
  background:#fff;
  border-radius:28px;
  border:3px solid #f0f0f0;
  padding:clamp(24px,4vw,40px);
  display:flex;flex-direction:column;
  gap:16px;
  box-shadow:0 8px 40px rgba(0,0,0,0.06);
  transition:transform .2s, box-shadow .2s, border-color .2s;
  opacity:0;
  animation:cardEntry .6s cubic-bezier(.2,0,0,1) 1.25s forwards;
  position:relative;
  overflow:hidden;
}
.game-card::before{
  content:'';
  position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(117,170,219,0.04) 0%,rgba(245,166,35,0.04) 100%);
  border-radius:inherit;
  pointer-events:none;
}
.game-card:hover{
  transform:translateY(-6px);
  box-shadow:0 20px 60px rgba(0,0,0,0.1);
  border-color:#75AADB;
}

@keyframes cardEntry{
  from{opacity:0;transform:translateY(30px) scale(.97)}
  to  {opacity:1;transform:translateY(0)    scale(1)}
}

.card-badge{
  display:inline-flex;align-items:center;gap:6px;
  font-family:'Bangers',cursive;
  font-size:clamp(11px,1.4vw,14px);
  color:#F5A623;
  background:rgba(245,166,35,0.1);
  border:1.5px solid rgba(245,166,35,0.25);
  padding:4px 14px;
  border-radius:20px;
  letter-spacing:2px;
  width:fit-content;
}

.card-emoji{
  font-size:clamp(48px,8vw,72px);
  line-height:1;
  filter:drop-shadow(0 6px 12px rgba(0,0,0,0.08));
}

.card-title{
  font-family:'Bangers',cursive;
  font-size:clamp(36px,6vw,60px);
  color:#1a1a2e;
  line-height:.95;
  letter-spacing:2px;
}
.card-title span{color:#75AADB}

.card-desc{
  font-size:clamp(14px,1.6vw,17px);
  font-weight:700;
  color:#999;
  letter-spacing:1px;
  line-height:1.5;
}

.card-meta{
  display:flex;gap:10px;flex-wrap:wrap;
  margin-top:2px;
}
.meta-tag{
  font-size:clamp(11px,1.2vw,13px);
  font-weight:900;
  color:#bbb;
  background:#f7f7f7;
  padding:4px 12px;
  border-radius:12px;
  letter-spacing:1px;
}

.card-btn{
  display:block;
  margin-top:6px;
  padding:clamp(14px,2vh,18px) 0;
  font-family:'Bangers',cursive;
  font-size:clamp(22px,3.5vw,32px);
  letter-spacing:3px;
  color:#1a1a2e;
  background:linear-gradient(135deg,#F5A623,#f7c948);
  border:none;
  border-radius:20px;
  cursor:pointer;
  text-align:center;
  text-decoration:none;
  box-shadow:0 8px 30px rgba(245,166,35,0.3), 0 4px 0 #c7851a;
  transition:all .15s;
}
.card-btn:hover{
  transform:translateY(-3px);
  box-shadow:0 14px 40px rgba(245,166,35,0.4), 0 6px 0 #c7851a;
}
.card-btn:active{
  transform:translateY(2px);
  box-shadow:0 3px 12px rgba(245,166,35,0.25), 0 2px 0 #c7851a;
}

/* ===== COMING SOON CARD ===== */
.card-soon{
  opacity:0 !important;
  animation:cardEntry .6s cubic-bezier(.2,0,0,1) 1.45s forwards !important;
  border-style:dashed !important;
  border-color:#eee !important;
  background:#fafafa !important;
  cursor:default;
}
.card-soon:hover{
  transform:none !important;
  box-shadow:0 8px 40px rgba(0,0,0,0.04) !important;
  border-color:#eee !important;
}
.soon-inner{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;
  min-height:220px;
  text-align:center;
}
.soon-icon{
  font-size:clamp(36px,6vw,52px);
  opacity:.25;
}
.soon-label{
  font-family:'Bangers',cursive;
  font-size:clamp(22px,3.5vw,32px);
  color:#ccc;
  letter-spacing:5px;
}
.soon-sub{
  font-size:clamp(12px,1.4vw,15px);
  font-weight:700;
  color:#ddd;
  letter-spacing:2px;
}

/* ===== FOOTER ===== */
.footer{
  margin-top:clamp(48px,8vh,80px);
  font-size:13px;
  font-weight:700;
  color:#ddd;
  letter-spacing:2px;
  text-align:center;
  opacity:0;
  animation:fadeDown .5s ease 1.7s forwards;
}
</style>
</head>
<body>

<!-- Particles -->
<div class="particles" id="particles"></div>

<div class="page">

  <!-- Hero -->
  <header class="hero">
<h1 class="hero-title">ENTRÁ<br><span>Y</span><br>DIVERTITE</h1>
    <p class="hero-tagline">PENSA. JUGÁ. GANÁ.</p>
  </header>

  <div class="divider"></div>

  <p class="grid-label">JUEGOS DISPONIBLES</p>

  <!-- Games grid -->
  <div class="games-grid">

    <!-- Mundial 2026 -->
    <div class="game-card">
      <div class="card-badge">&#11088; DISPONIBLE AHORA</div>
      <div class="card-emoji">&#127942;</div>
      <div class="card-title">MUNDIAL<br><span>2026</span></div>
      <div class="card-desc">12 niveles de ingenio futbolero</div>
      <div class="card-meta">
        <span class="meta-tag">12 NIVELES</span>
        <span class="meta-tag">FÚTBOL</span>
        <span class="meta-tag">ARGENTINA</span>
      </div>
      <a class="card-btn" href="./mundial2026/">JUGAR AHORA</a>
    </div>

    <!-- Coming soon -->
    <div class="game-card card-soon">
      <div class="soon-inner">
        <div class="soon-icon">&#127918;</div>
        <div class="soon-label">PRÓXIMAMENTE</div>
        <div class="soon-sub">NUEVO JUEGO EN CAMINO...</div>
      </div>
    </div>

  </div>

  <footer class="footer">JUEGOS DE INGENIO &copy; 2026</footer>

</div>

<script>
(function(){
  const container = document.getElementById('particles');
  const items = ['&#9917;','&#11088;','&#127942;'];
  const colors = ['#b8d8f0','#f7dba0','#e8e8e8','#d4e8f7'];
  for(let i = 0; i < 22; i++){
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 8 + Math.random() * 20;
    if(Math.random() > .55){
      p.innerHTML = items[Math.floor(Math.random() * items.length)];
      p.style.cssText = `font-size:${size}px;left:${3 + Math.random()*94}%;animation-duration:${11+Math.random()*16}s;animation-delay:${Math.random()*14}s;`;
    } else {
      p.style.cssText = `width:${size}px;height:${size}px;background:${colors[Math.floor(Math.random()*colors.length)]};left:${3+Math.random()*94}%;animation-duration:${11+Math.random()*16}s;animation-delay:${Math.random()*14}s;opacity:0;`;
    }
    container.appendChild(p);
  }
})();
</script>
</body>
</html>
