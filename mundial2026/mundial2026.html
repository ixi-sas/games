<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mundial 2026 - Juegos de Ingenio</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700;900&display=swap');

*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Nunito',sans-serif;background:#fff;user-select:none;-webkit-user-select:none;cursor:default}

/* ===== START SCREEN ===== */
#startScreen{
  position:fixed;inset:0;z-index:1000;background:#fff;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity 1s,transform 1s;overflow:hidden;
}
#startScreen.hidden{opacity:0;transform:scale(1.05);pointer-events:none}

/* Floating particles bg */
.particles{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:0}
.particle{
  position:absolute;border-radius:50%;opacity:0;
  animation:particleFloat linear infinite;
}
@keyframes particleFloat{
  0%{transform:translateY(100vh) rotate(0deg);opacity:0}
  10%{opacity:.35}
  90%{opacity:.35}
  100%{transform:translateY(-10vh) rotate(360deg);opacity:0}
}

/* Year badge */
.start-year{
  font-family:'Bangers',cursive;font-size:clamp(18px,2.5vw,30px);
  color:#75AADB;letter-spacing:8px;margin-bottom:5px;
  opacity:0;animation:fadeDown .6s ease .2s forwards;
  position:relative;z-index:2;
}
.start-year span{color:#ccc;font-size:.7em;letter-spacing:4px}

.start-title{
  font-family:'Bangers',cursive;font-size:clamp(64px,14vw,180px);
  color:#1a1a2e;letter-spacing:6px;line-height:.9;
  text-shadow:4px 4px 0 #75AADB,8px 8px 0 rgba(117,170,219,0.15);
  opacity:0;animation:titleEntry .8s cubic-bezier(.2,0,0,1) .4s forwards;
  position:relative;z-index:2;
}

.start-hook{
  font-size:clamp(17px,2.8vw,32px);color:#555;margin:8px 0 6px;
  font-weight:900;letter-spacing:1px;line-height:1.3;text-align:center;
  max-width:700px;white-space:nowrap;
  opacity:0;animation:fadeDown .6s ease .8s forwards;
  position:relative;z-index:2;
}
.start-hook em{font-style:normal;color:#F5A623}

.start-tagline{
  font-size:clamp(13px,1.8vw,20px);color:#bbb;font-weight:700;
  letter-spacing:2px;margin-bottom:clamp(25px,4vh,50px);
  opacity:0;animation:fadeDown .6s ease 1s forwards;
  position:relative;z-index:2;
}

.start-btn{
  padding:22px 80px;font-family:'Bangers',cursive;font-size:clamp(28px,5vw,52px);
  background:linear-gradient(135deg,#F5A623,#f7c948);color:#1a1a2e;
  border:none;border-radius:60px;cursor:pointer;letter-spacing:3px;
  box-shadow:0 10px 40px rgba(245,166,35,0.35),0 5px 0 #c7851a;
  transition:all .15s;position:relative;z-index:10;
  opacity:0;animation:btnEntry .6s cubic-bezier(.2,0,0,1) 1.2s forwards;
}
.start-btn:hover{transform:translateY(-4px);box-shadow:0 15px 50px rgba(245,166,35,0.45),0 7px 0 #c7851a}
.start-btn:active{transform:translateY(3px);box-shadow:0 4px 15px rgba(245,166,35,0.3),0 2px 0 #c7851a}

.start-badge{
  display:inline-block;font-family:'Bangers',cursive;font-size:clamp(13px,1.8vw,18px);
  color:#fff;background:#75AADB;padding:4px 16px;border-radius:20px;
  letter-spacing:2px;margin-top:12px;
  opacity:0;animation:fadeDown .5s ease 1.5s forwards;
  position:relative;z-index:2;
}

.start-players{
  position:absolute;inset:0;pointer-events:none;z-index:1;
}
.start-players img{
  position:absolute;bottom:0;
  height:clamp(150px,32vh,380px);
  filter:drop-shadow(0 12px 25px rgba(0,0,0,0.08));
  opacity:0;
  animation:playerEntry .7s cubic-bezier(.2,0,0,1) forwards, floatP 3.5s ease-in-out infinite;
}
/* Left side */
.start-players img:nth-child(1){left:2%;animation-delay:1.4s,1.4s}
.start-players img:nth-child(2){left:18%;animation-delay:1.55s,1.55s}
/* Right side */
.start-players img:nth-child(3){right:18%;animation-delay:1.7s,1.7s}
.start-players img:nth-child(4){right:2%;animation-delay:1.85s,1.85s}

@keyframes fadeDown{from{opacity:0;transform:translateY(-15px)}to{opacity:1;transform:translateY(0)}}
@keyframes titleEntry{from{opacity:0;transform:scale(.7) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes btnEntry{from{opacity:0;transform:scale(.8) translateY(15px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes playerEntry{from{opacity:0;transform:translateY(80px)}to{opacity:1;transform:translateY(0)}}
@keyframes floatP{0%,100%{transform:translateY(0)}50%{transform:translateY(-18px)}}

/* ===== GAME SCREEN ===== */
#game{position:fixed;inset:0;display:none;flex-direction:column;background:#fff}
#game.on{display:flex}
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 24px;position:relative;z-index:100;flex-shrink:0;
}
.lvl-badge{font-family:'Bangers',cursive;font-size:22px;color:#75AADB;background:rgba(117,170,219,0.1);padding:6px 20px;border-radius:30px;white-space:nowrap;flex-shrink:0}
.lvl-badge b{color:#1a1a2e}
.star-row{display:flex;gap:3px;flex-wrap:wrap;justify-content:center;max-width:40vw;overflow:hidden;max-height:32px}
.star-dot{width:10px;height:10px;border-radius:50%;background:#eee;transition:all .4s;flex-shrink:0}
.star-dot.on{background:#F5A623;box-shadow:0 0 6px rgba(245,166,35,0.5)}
.hint-btn{
  font-family:'Nunito',sans-serif;font-size:15px;font-weight:900;
  color:#ccc;background:none;border:2px solid #eee;padding:6px 18px;
  border-radius:20px;cursor:pointer;transition:all .3s;
}
.hint-btn:hover{color:#F5A623;border-color:#F5A623}

/* Question */
.question{text-align:center;padding:0 clamp(12px,3vw,30px);flex-shrink:0;z-index:50}
.question h1{
  font-family:'Bangers',cursive;font-size:clamp(22px,4.5vw,56px);
  color:#1a1a2e;line-height:1.2;letter-spacing:1px;
}
.question h1 .drag-word{
  cursor:grab;display:inline-block;position:relative;z-index:200;
  background:linear-gradient(transparent 55%,rgba(245,166,35,0.25) 55%);
  padding:0 6px;transition:color .2s,transform .2s;
}
.question h1 .drag-word:hover{color:#F5A623;transform:scale(1.08)}

/* Play area */
.play{flex:1;position:relative;overflow:hidden}

/* Shared element styles */
.player-img{
  filter:drop-shadow(0 12px 30px rgba(0,0,0,0.10));
  transition:transform .3s,opacity .5s;
  pointer-events:none;
}
.player-img.interactive{pointer-events:auto;cursor:pointer}
@keyframes shake{0%,100%{transform:translateX(0) rotate(0)}20%{transform:translateX(-12px) rotate(-3deg)}40%{transform:translateX(12px) rotate(3deg)}60%{transform:translateX(-8px) rotate(-2deg)}80%{transform:translateX(8px) rotate(2deg)}}
@keyframes poof{0%{transform:scale(1);opacity:1}50%{transform:scale(1.4);opacity:.4}100%{transform:scale(0);opacity:0}}

/* L1 scoreboard */
.score-board{
  display:flex;align-items:center;gap:clamp(20px,5vw,60px);
  position:absolute;top:clamp(10px,3vh,40px);left:50%;transform:translateX(-50%);z-index:20;
}
.score-team{display:flex;flex-direction:column;align-items:center;gap:4px}
.score-team small{font-size:clamp(12px,1.5vw,18px);font-weight:900;color:#aaa;letter-spacing:2px}
.score-num{font-family:'Bangers',cursive;font-size:clamp(56px,10vw,120px);color:#1a1a2e;line-height:1;transition:all .3s}
.score-num.drag{cursor:grab;color:#F5A623}
.score-num.drag:hover{transform:scale(1.12);text-shadow:0 0 30px rgba(245,166,35,0.3)}
.score-sep{font-family:'Bangers',cursive;font-size:clamp(40px,7vw,80px);color:#ddd}
.score-drop{
  min-width:clamp(50px,8vw,100px);min-height:clamp(60px,10vw,120px);
  border:4px dashed #eee;border-radius:16px;display:flex;align-items:center;justify-content:center;transition:all .3s;
}
.score-drop.glow{border-color:#F5A623;background:rgba(245,166,35,0.06);box-shadow:0 0 40px rgba(245,166,35,0.15)}

/* Goal */
.goal{
  position:absolute;top:clamp(5px,3vh,30px);left:50%;transform:translateX(-50%);
  width:clamp(280px,50vw,550px);height:clamp(180px,30vh,350px);
  border:6px solid #e0e0e0;border-bottom:none;border-radius:10px 10px 0 0;
  background:repeating-linear-gradient(90deg,transparent,transparent 22px,rgba(0,0,0,.03) 22px,rgba(0,0,0,.03) 24px),
             repeating-linear-gradient(0deg,transparent,transparent 22px,rgba(0,0,0,.03) 22px,rgba(0,0,0,.03) 24px);
  z-index:5;
}
.goal::after{content:'';position:absolute;bottom:0;left:-15px;right:-15px;height:5px;background:#e0e0e0;border-radius:3px}

/* Ball */
.ball{
  width:clamp(45px,6vw,70px);height:clamp(45px,6vw,70px);
  background:radial-gradient(circle at 35% 35%,#fff,#e0e0e0);
  border:3px solid #333;border-radius:50%;cursor:pointer;
  box-shadow:0 6px 20px rgba(0,0,0,0.15);display:flex;align-items:center;justify-content:center;
  font-size:clamp(20px,3vw,32px);transition:all .2s;z-index:30;position:absolute;
}
.ball:hover{transform:scale(1.1)}

/* Direction buttons L6 */
.dir-btns{
  position:absolute;bottom:clamp(20px,5vh,60px);left:50%;transform:translateX(-50%);
  display:flex;gap:15px;z-index:20;
}
.dir-btn{
  padding:clamp(10px,1.5vh,18px) clamp(20px,3vw,40px);
  font-family:'Bangers',cursive;font-size:clamp(18px,2.5vw,28px);
  background:#fff;border:3px solid #eee;border-radius:14px;cursor:pointer;transition:all .2s;
}
.dir-btn:hover{border-color:#75AADB;background:#f0f7ff}
.dir-btn.miss{border-color:#e74c3c;background:#fff5f5;animation:shake .4s ease}

/* Numpad L7 */
.numpad{
  display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(8px,1.2vw,15px);
  position:absolute;right:clamp(30px,6vw,80px);top:50%;transform:translateY(-50%);
}
.nbtn{
  width:clamp(55px,7vw,80px);height:clamp(55px,7vw,80px);
  font-family:'Bangers',cursive;font-size:clamp(24px,3.5vw,36px);
  background:#fff;border:3px solid #eee;border-radius:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s;
}
.nbtn:hover{border-color:#75AADB;transform:scale(1.06)}
.nbtn.dead{opacity:.25;cursor:not-allowed;text-decoration:line-through;color:#ccc}
.nbtn.ok{background:#e8f8e8;border-color:#4caf50;color:#2e7d32}
.answer-box{
  font-family:'Bangers',cursive;font-size:clamp(64px,12vw,140px);
  color:#1a1a2e;position:absolute;left:clamp(30px,6vw,80px);top:50%;transform:translateY(-50%);
  border-bottom:6px solid #eee;min-width:clamp(60px,10vw,120px);text-align:center;transition:all .4s;
}
.answer-box.correct{color:#4caf50;border-color:#4caf50}

/* Group L8 */
.group-col{
  display:flex;flex-direction:column;gap:clamp(10px,1.5vh,18px);
  position:absolute;left:clamp(30px,8vw,100px);top:50%;transform:translateY(-50%);
}
.group-title{font-family:'Bangers',cursive;font-size:clamp(16px,2vw,24px);color:#ccc;letter-spacing:2px}
.flag-row{
  display:flex;align-items:center;gap:clamp(10px,1.5vw,20px);
  padding:clamp(10px,1.5vh,16px) clamp(15px,2vw,25px);
  background:#fafafa;border-radius:14px;font-family:'Bangers',cursive;
  font-size:clamp(18px,2.5vw,28px);color:#333;cursor:pointer;transition:all .3s;
}
.flag-row:hover{background:#f0f0f0}
.flag-row .fem{font-size:clamp(28px,4vw,48px)}
.trash{
  position:absolute;right:clamp(30px,6vw,80px);bottom:clamp(30px,6vh,80px);
  font-size:clamp(50px,8vw,90px);transition:all .3s;opacity:.3;z-index:50;
}
.trash.hot{opacity:1;transform:scale(1.2)}

/* TV L9 - realistic TV */
.tv-wrap{
  position:absolute;left:50%;top:42%;transform:translate(-50%,-50%);
  display:flex;flex-direction:column;align-items:center;
}
.tv{
  width:clamp(320px,58vw,650px);height:clamp(200px,34vh,380px);
  background:#0a0a0a;border-radius:4px;overflow:hidden;
  border:clamp(6px,1vw,14px) solid #1a1a1a;
  box-shadow:0 20px 60px rgba(0,0,0,0.25),inset 0 0 30px rgba(0,0,0,0.5);
  position:relative;
}
/* Glossy reflection */
.tv::before{
  content:'';position:absolute;inset:0;z-index:3;pointer-events:none;
  background:linear-gradient(135deg,rgba(255,255,255,0.04) 0%,transparent 50%);
}
/* Stand */
.tv-stand{
  width:clamp(100px,15vw,180px);height:clamp(6px,1vh,10px);
  background:linear-gradient(180deg,#2a2a2a,#1a1a1a);
  border-radius:0 0 4px 4px;
}
.tv-foot{
  width:clamp(140px,22vw,240px);height:clamp(4px,.6vh,6px);
  background:linear-gradient(180deg,#333,#222);
  border-radius:0 0 6px 6px;margin-top:-1px;
}
/* Brand logo */
.tv-brand{
  position:absolute;bottom:clamp(3px,.5vh,6px);left:50%;transform:translateX(-50%);
  font-family:'Nunito',sans-serif;font-size:clamp(7px,1vw,11px);
  color:#333;letter-spacing:3px;font-weight:900;z-index:4;
}
/* LED indicator */
.tv-led{
  position:absolute;bottom:clamp(4px,.6vh,8px);right:clamp(8px,1.2vw,14px);
  width:6px;height:6px;background:#e74c3c;border-radius:50%;z-index:4;
  box-shadow:0 0 6px rgba(231,76,60,0.6);
}
.tv-led.green{background:#2ecc71;box-shadow:0 0 6px rgba(46,204,113,0.6)}

.tv-inner{
  width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#1a5c1a,#2d8e2d);position:relative;transition:all .5s;
}
.tv-inner img{height:clamp(100px,20vh,220px);filter:drop-shadow(0 8px 20px rgba(0,0,0,0.3))}
.tv-label{
  position:absolute;bottom:clamp(14px,2vh,20px);left:12px;
  font-family:'Bangers',cursive;font-size:clamp(12px,1.5vw,18px);
  color:#fff;background:rgba(200,0,0,.7);padding:4px 12px;border-radius:4px;
}
/* REC dot */
.tv-label::before{
  content:'';display:inline-block;width:8px;height:8px;background:#fff;
  border-radius:50%;margin-right:6px;vertical-align:middle;
  animation:recBlink 1s ease infinite;
}
@keyframes recBlink{0%,100%{opacity:1}50%{opacity:.3}}
.remote{
  position:absolute;right:clamp(20px,5vw,60px);bottom:clamp(20px,4vh,50px);
  width:clamp(60px,7vw,85px);height:clamp(140px,18vh,210px);
  background:linear-gradient(180deg,#2a2a2a,#1a1a1a);
  border-radius:12px 12px 20px 20px;
  cursor:pointer;display:flex;flex-direction:column;align-items:center;
  padding:clamp(10px,1.5vh,16px) 8px;gap:0;
  box-shadow:0 8px 25px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.08);
  transition:all .2s;z-index:30;overflow:hidden;
}
.remote:hover{transform:scale(1.06);box-shadow:0 12px 35px rgba(0,0,0,0.35)}
/* Power button */
.remote .r-power{
  width:clamp(28px,3.5vw,38px);height:clamp(28px,3.5vw,38px);
  background:radial-gradient(circle,#e74c3c,#c0392b);border-radius:50%;
  margin-bottom:clamp(6px,1vh,10px);
  box-shadow:0 2px 6px rgba(231,76,60,0.4),inset 0 -2px 3px rgba(0,0,0,0.3);
  display:flex;align-items:center;justify-content:center;
  font-size:clamp(12px,1.5vw,16px);color:rgba(255,255,255,0.8);
}
/* Channel/volume buttons */
.remote .r-row{display:flex;gap:clamp(4px,.6vw,8px);margin:clamp(3px,.4vh,5px) 0}
.remote .r-btn{
  width:clamp(22px,2.8vw,30px);height:clamp(16px,2vh,22px);
  background:#444;border-radius:4px;
  box-shadow:inset 0 -1px 2px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.06);
}
.remote .r-btn.ch{background:#555}
/* Number pad dots */
.remote .r-numpad{
  display:grid;grid-template-columns:repeat(3,1fr);gap:3px;
  margin-top:clamp(4px,.6vh,8px);
}
.remote .r-num{
  width:clamp(12px,1.5vw,16px);height:clamp(10px,1.2vh,14px);
  background:#3a3a3a;border-radius:3px;
  box-shadow:inset 0 -1px 1px rgba(0,0,0,0.3);
}
/* IR sensor */
.remote .r-ir{
  width:clamp(20px,2.5vw,28px);height:clamp(6px,.8vh,8px);
  background:#1a1a1a;border-radius:10px;margin-top:auto;
  box-shadow:inset 0 1px 2px rgba(0,0,0,0.5);
  position:relative;
}
.remote .r-ir::after{
  content:'';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  width:6px;height:6px;background:#330000;border-radius:50%;
}

/* Options L11 */
.opts{
  display:flex;flex-wrap:wrap;gap:clamp(10px,2vw,20px);
  justify-content:center;position:absolute;bottom:clamp(30px,6vh,80px);
  left:50%;transform:translateX(-50%);z-index:20;
}
.opt{
  padding:clamp(12px,2vh,20px) clamp(25px,4vw,50px);
  font-family:'Bangers',cursive;font-size:clamp(20px,3vw,32px);
  background:#fff;border:3px solid #eee;border-radius:16px;cursor:pointer;transition:all .2s;
}
.opt:hover{border-color:#75AADB;background:#f0f7ff;transform:scale(1.04)}
.opt.yes{border-color:#4caf50;background:#e8f8e8}
.opt.no{border-color:#e74c3c;background:#fff5f5;animation:shake .4s ease}

/* Trophy case L12 */
.t-case{
  width:clamp(180px,25vw,280px);height:clamp(220px,30vh,340px);
  background:linear-gradient(135deg,#1a2a3e,#16213e);border-radius:24px;
  border:4px solid rgba(245,166,35,0.3);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:10px;
  box-shadow:0 20px 60px rgba(0,0,0,0.25);transition:all .5s;
  position:absolute;left:50%;top:45%;transform:translate(-50%,-50%);
}
.t-case .cup{font-size:clamp(50px,8vw,90px);filter:brightness(.4);transition:all .5s}
.t-case .lock{font-size:clamp(36px,5vw,56px);cursor:pointer;animation:lockWiggle 4s ease-in-out infinite;transition:all .3s}
.t-case .lock:hover{transform:scale(1.15)}
.t-case .taps{font-family:'Bangers',cursive;font-size:clamp(16px,2vw,22px);color:rgba(255,255,255,.35)}
.t-case.open{border-color:#F5A623;background:linear-gradient(135deg,#1a3a5c,#2c5a8e);box-shadow:0 20px 80px rgba(245,166,35,0.2)}
.t-case.open .cup{filter:brightness(1);font-size:clamp(70px,12vw,130px)}
@keyframes lockWiggle{0%,90%,100%{transform:rotate(0)}93%{transform:rotate(-5deg)}96%{transform:rotate(5deg)}}

/* ===== OVERLAYS ===== */
#successOverlay{
  position:fixed;inset:0;z-index:5000;background:rgba(255,255,255,.96);
  display:none;flex-direction:column;align-items:center;justify-content:center;
  opacity:0;transition:opacity .5s;
}
#successOverlay.on{display:flex;opacity:1}
.suc-text{font-family:'Bangers',cursive;font-size:clamp(40px,8vw,90px);color:#1a1a2e;animation:sucBounce .6s ease}
.suc-sub{font-size:clamp(16px,2.5vw,24px);color:#888;margin:8px 0 35px;font-weight:700}
.nxt-btn{
  padding:18px 60px;font-family:'Bangers',cursive;font-size:clamp(24px,4vw,36px);
  background:linear-gradient(135deg,#75AADB,#5a9bd5);color:#fff;
  border:none;border-radius:50px;cursor:pointer;letter-spacing:2px;
  box-shadow:0 8px 30px rgba(117,170,219,0.35),0 4px 0 #4a8ac5;transition:all .15s;
}
.nxt-btn:hover{transform:translateY(-3px)}
.nxt-btn:active{transform:translateY(2px)}
@keyframes sucBounce{0%{transform:scale(0) rotate(-10deg);opacity:0}60%{transform:scale(1.15) rotate(2deg)}100%{transform:scale(1) rotate(0);opacity:1}}

.wrong-pop{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);
  background:#fff;padding:clamp(12px,2vw,20px) clamp(20px,4vw,40px);
  border-radius:16px;border:3px solid #e74c3c;
  z-index:4500;font-family:'Bangers',cursive;font-size:clamp(16px,3vw,32px);color:#e74c3c;

// ===== GAME FUNCTIONS =====
function startGame(){
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('game').classList.add('on');
  cur=0;stars=0;attempts={};done={};updateStars();
  setTimeout(()=>loadLv(0),600);
}
function loadLv(n){
  cur=n;
  if(n>=L.length){showFinal();return}
  cleanupLevel();
  document.getElementById('lvlNum').textContent=n+1;
  document.getElementById('qText').innerHTML=L[n].q;
  document.getElementById('play').innerHTML='';
  hidePopups();
  if(!attempts[n])attempts[n]=0;
  L[n].fn();
  setupDragWords();
}
function nextLevel(){document.getElementById('successOverlay').classList.remove('on');loadLv(cur+1)}
function lvComplete(delay){
  if(done[cur])return;done[cur]=true;sfxOk();
  const a=attempts[cur]||0;stars+=a===0?3:a<=2?2:1;updateStars();
  // Confetti immediately for celebration feel
  confetti(50);

    confetti(40);

    document.getElementById('sucSub').textContent=L[cur].sub;
    document.getElementById('nxtBtn').textContent=cur<L.length-1?'SIGUIENTE':'FINAL';
    document.getElementById('successOverlay').classList.add('on');

}
function wrong(m){

  const p=document.getElementById('wrongPop');p.textContent=m||'Nope!';p.classList.add('on');
  setTimeout(()=>p.classList.remove('on'),2000);
}
function showHint(){

}
function hidePopups(){document.getElementById('hintPop').classList.remove('on');document.getElementById('wrongPop').classList.remove('on')}

// ===== ROBUST DRAG ENGINE =====
// Uses a fixed-position ghost clone so the original element stays in layout.
// Returns cleanup function.
function mkDrag(el,cb){
  el.style.cursor='grab';
  el.style.pointerEvents='auto';
  let ghost=null,ox,oy,sx,sy,active=false,hasMoved=false;

  function start(e){
    e.preventDefault();
    const t=e.touches?e.touches[0]:e;
    const r=el.getBoundingClientRect();
    ox=t.clientX-r.left;
    oy=t.clientY-r.top;
    sx=t.clientX;sy=t.clientY;
    active=true;hasMoved=false;
    sfxClick();
  }
  function move(e){
    if(!active)return;
    e.preventDefault();
    const t=e.touches?e.touches[0]:e;
    // Only create ghost after real movement (>5px)
    if(!hasMoved){
      if(Math.abs(t.clientX-sx)<5&&Math.abs(t.clientY-sy)<5)return;
      hasMoved=true;
      const r=el.getBoundingClientRect();
      const cs=getComputedStyle(el);
      ghost=el.cloneNode(true);
      // Reset ALL positioning from original - ghost uses fixed only
      ghost.removeAttribute('class');
      ghost.className='drag-ghost';
      ghost.style.cssText='';
      ghost.style.position='fixed';
      ghost.style.zIndex='9999';
      ghost.style.pointerEvents='none';
      ghost.style.width=r.width+'px';
      ghost.style.height=r.height+'px';
      ghost.style.left=r.left+'px';
      ghost.style.top=r.top+'px';
      ghost.style.transform='none';
      ghost.style.fontFamily=cs.fontFamily;
      ghost.style.fontSize=cs.fontSize;
      ghost.style.fontWeight=cs.fontWeight;
      ghost.style.color=cs.color;
      ghost.style.lineHeight=cs.lineHeight;
      ghost.style.letterSpacing=cs.letterSpacing;
      ghost.style.textAlign='center';
      ghost.style.display='flex';
      ghost.style.alignItems='center';
      ghost.style.justifyContent='center';
      ghost.style.filter='drop-shadow(0 20px 40px rgba(0,0,0,0.2))';
      document.body.appendChild(ghost);
      floatingEls.push(ghost);
      el.style.opacity='0.3';
    }
    if(ghost){
      ghost.style.left=(t.clientX-ox)+'px';
      ghost.style.top=(t.clientY-oy)+'px';
    }
    cb?.move?.(t.clientX,t.clientY);
  }
  function end(e){
    if(!active)return;
    active=false;
    if(!hasMoved||!ghost){
      // Was just a click, no drag happened
      return;
    }
    const t=e.changedTouches?e.changedTouches[0]:e;
    const accepted=cb?.end?.(t.clientX,t.clientY);
    if(accepted){
      el.style.opacity='0';
      if(ghost){ghost.style.transition='all .3s';ghost.style.opacity='0';ghost.style.transform='scale(.5)';
        setTimeout(()=>{ghost.remove();floatingEls=floatingEls.filter(x=>x!==ghost);ghost=null},300);}
    } else {
      const r=el.getBoundingClientRect();
      ghost.style.transition='all .3s ease';
      ghost.style.left=r.left+'px';
      ghost.style.top=r.top+'px';
      el.style.opacity='1';
      setTimeout(()=>{ghost.remove();floatingEls=floatingEls.filter(x=>x!==ghost);ghost=null},300);
    }
  }

  addLvListener(el,'mousedown',start);
  addLvListener(document,'mousemove',move);
  addLvListener(document,'mouseup',end);
  addLvListener(el,'touchstart',start,{passive:false});
  addLvListener(document,'touchmove',move,{passive:false});
  addLvListener(document,'touchend',end);
}

function over(x,y,t){const r=t.getBoundingClientRect();return x>=r.left&&x<=r.right&&y>=r.top&&y<=r.bottom}

// ===== DRAG WORDS ENGINE =====
function setupDragWords(){
  document.querySelectorAll('.drag-word').forEach(w=>{
    let ghost=null,ox,oy,active=false;

    function start(e){
      e.preventDefault();e.stopPropagation();
      const t=e.touches?e.touches[0]:e;
      const r=w.getBoundingClientRect();
      ox=t.clientX-r.left;
      oy=t.clientY-r.top;
      active=true;

      ghost=document.createElement('div');
      ghost.className='drag-word-ghost';
      ghost.textContent=w.textContent;
      ghost.style.left=r.left+'px';
      ghost.style.top=r.top+'px';
      document.body.appendChild(ghost);
      floatingEls.push(ghost);
      w.style.opacity='0.3';
      sfxClick();
    }
    function move(e){
      if(!active||!ghost)return;
      e.preventDefault();
      const t=e.touches?e.touches[0]:e;
      ghost.style.left=(t.clientX-ox)+'px';
      ghost.style.top=(t.clientY-oy)+'px';
      document.dispatchEvent(new CustomEvent('dwMove',{detail:{x:t.clientX,y:t.clientY,k:w.dataset.dw}}));
    }
    function end(e){
      if(!active||!ghost)return;
      active=false;
      const t=e.changedTouches?e.changedTouches[0]:e;
      const ev=new CustomEvent('dwEnd',{detail:{x:t.clientX,y:t.clientY,k:w.dataset.dw}});
      document.dispatchEvent(ev);
      // Check if level consumed it
      if(w.dataset.consumed==='true'){
        ghost.style.transition='all .3s';ghost.style.transform='scale(0)';ghost.style.opacity='0';
        setTimeout(()=>{ghost.remove()},300);
        w.style.display='none';
      } else {
        // Snap back
        const r=w.getBoundingClientRect();
        ghost.style.transition='all .3s ease';
        ghost.style.left=r.left+'px';ghost.style.top=r.top+'px';
        w.style.opacity='1';
        setTimeout(()=>{ghost.remove();floatingEls=floatingEls.filter(x=>x!==ghost);ghost=null},300);
      }
    }

    addLvListener(w,'mousedown',start);
    addLvListener(document,'mousemove',move);
    addLvListener(document,'mouseup',end);
    addLvListener(w,'touchstart',start,{passive:false});
    addLvListener(document,'touchmove',move,{passive:false});
    addLvListener(document,'touchend',end);
  });
}

  `;

  mkDrag(mb,{

    ball.style.left=(gr.left+gr.width/2-ball.offsetWidth/2)+'px';

    <div class="ball" id="l6ball" style="bottom:clamp(90px,18vh,160px);left:50%;transform:translateX(-50%);cursor:grab">&#9917;</div>
  `;
  const ball=document.getElementById('l6ball'),goal=document.getElementById('l6goal');
  mkDrag(ball,{
    move(x,y){goal.style.boxShadow=over(x,y,goal)?'0 0 50px rgba(245,166,35,.2)':''},
    end(x,y){
      goal.style.boxShadow='';
      if(over(x,y,goal)){
        ball.style.display='none';
        // Animate ghost into goal center
        const ghosts=document.querySelectorAll('.drag-ghost');
        const gr=goal.getBoundingClientRect();
        ghosts.forEach(g=>{
          g.style.transition='all .3s ease';
          g.style.left=(gr.left+gr.width/2-30)+'px';
          g.style.top=(gr.top+gr.height/2-30)+'px';
          g.style.transform='scale(.5)';
        });
        sfxGoal();setTimeout(lvComplete,600);return true;
      }
    }
  });
}

// ===== LEVEL 7: 1+2=3 =====
function lv7(){
  const p=document.getElementById('play');
  const m=mob();
  const ph=rph(m?.45:.55,320);
  p.innerHTML=`
    <div class="answer-box" id="l7ans" style="${m?'left:50%;transform:translate(-50%,-120%);font-size:60px;top:35%':''}">?</div>
    <img src="${I.messiC}" class="player-img" style="height:${ph};position:absolute;${m?'left:50%;transform:translateX(-50%);bottom:0;opacity:.15':'left:clamp(10px,3vw,40px);bottom:0'};pointer-events:none">
    <div class="numpad" style="${m?'right:auto;left:50%;transform:translate(-50%,-50%)':''}">
      <div class="nbtn" id="n1" data-n="1" style="cursor:grab">1</div>
      <div class="nbtn" id="n2" data-n="2" style="cursor:grab">2</div>
      <div class="nbtn dead">3</div>
      <div class="nbtn" onclick="wrong('Argentina tiene 4? Ojala...')">4</div>
      <div class="nbtn" onclick="wrong('5 copas? Tranqui...')">5</div>
      <div class="nbtn" onclick="wrong('6?! Sonar es gratis.')">6</div>
      <div class="nbtn" onclick="wrong('7 copas jaja')">7</div>
      <div class="nbtn" onclick="wrong('Estas delirando...')">8</div>
      <div class="nbtn" onclick="wrong('9 mundiales???')">9</div>
    </div>
  `;
  const n1=document.getElementById('n1'),n2=document.getElementById('n2'),ans=document.getElementById('l7ans');
  function solve(keep){
    keep.textContent='3';keep.classList.add('ok');keep.style.fontSize='clamp(30px,5vw,44px)';
    ans.textContent='3';ans.classList.add('correct');
    sfxGoal();setTimeout(lvComplete,800);
  }
  mkDrag(n1,{
    move(x,y){n2.style.boxShadow=over(x,y,n2)?'0 0 25px rgba(245,166,35,.4)':''},
    end(x,y){n2.style.boxShadow='';if(over(x,y,n2)){n1.style.display='none';solve(n2);return true}}
  });
  mkDrag(n2,{
    move(x,y){n1.style.boxShadow=over(x,y,n1)?'0 0 25px rgba(245,166,35,.4)':''},
    end(x,y){n1.style.boxShadow='';if(over(x,y,n1)){n2.style.display='none';solve(n1);return true}}
  });
}

function lv10(){

    <img src="${I.messiC2}" class="player-img" id="l10messi" style="height:${ph};position:absolute;left:50%;bottom:0;transform:translateX(-50%)">

  `;
  const ms=document.getElementById('l10messi');

    if(e.detail.k==='copa')ms.style.filter=over(e.detail.x,e.detail.y,ms)?'drop-shadow(0 0 30px rgba(245,166,35,.4))':'';
  }
  function onEnd(e){
    if(e.detail.k==='copa'&&over(e.detail.x,e.detail.y,ms)){
      document.querySelector('[data-dw="copa"]').dataset.consumed='true';
      ms.src=I.messiC;ms.style.filter='';
      // Trophy centered above Messi's head
      const mr=ms.getBoundingClientRect();
      const cupSize=Math.min(mr.width*.5,80);
      const cup=document.createElement('div');
      cup.style.cssText=`position:fixed;font-size:${cupSize}px;pointer-events:none;z-index:30;animation:sucBounce .5s ease;left:${mr.left+mr.width/2-cupSize/2}px;top:${mr.top-cupSize*.7}px`;
      cup.textContent='\uD83C\uDFC6';
      document.body.appendChild(cup);
      floatingEls.push(cup);
      sfxGoal();setTimeout(lvComplete,700);
    }
  }
  addLvListener(document,'dwMove',onMove);
  addLvListener(document,'dwEnd',onEnd);
}

// ===== LEVEL 12: Triple tap =====
function lv12(){
  const p=document.getElementById('play');
  const m=mob();
  const ph=rph(m?.4:.5,260);
  p.innerHTML=`
    <div class="t-case" id="l12case">
      <div class="cup" id="l12cup">&#127942;</div>
      <div class="lock" id="l12lock">&#128274;</div>
      <div class="taps" id="l12taps">. . . .</div>
    </div>
    <img src="${I.messiC}" class="player-img" style="height:${m?rph(.3,150):ph};position:absolute;left:${m?'-2%':'8%'};bottom:0;pointer-events:none">
    <img src="${I.messiC2}" class="player-img" style="height:${m?rph(.3,150):ph};position:absolute;right:${m?'-2%':'8%'};bottom:0;pointer-events:none">
  `;
  let taps=0;
  document.getElementById('l12lock').onclick=()=>{
    taps++;sfxClick();
    const dots=['&#11088;','&#11088;','&#11088;','&#11088;'];
    for(let i=taps;i<4;i++)dots[i]='. ';
    document.getElementById('l12taps').innerHTML=dots.join(' ');
    const lock=document.getElementById('l12lock');
    if(taps===1)lock.style.transform='rotate(-8deg)';
    if(taps===2)lock.style.transform='rotate(8deg)';
    if(taps===3)lock.style.transform='rotate(-5deg) scale(1.1)';
    if(taps>=4){
      lock.textContent='\uD83D\uDD13';lock.style.transform='scale(1.3)';
      const c=document.getElementById('l12case');c.classList.add('open');
      const cup=document.getElementById('l12cup');
      cup.style.filter='brightness(1)';cup.style.animation='sucBounce .5s ease';
      setTimeout(()=>{lock.style.display='none';document.getElementById('l12taps').innerHTML='<span style="color:#F5A623">&#9733; &#9733; &#9733; &#9733;</span>'},400);
      sfxGoal();setTimeout(lvComplete,800);
    }
  };
}

document.addEventListener('touchstart',e=>{if(e.touches.length>1)e.preventDefault()},{passive:false});
let lte=0;document.addEventListener('touchend',e=>{const n=Date.now();if(n-lte<=300)e.preventDefault();lte=n},false);
